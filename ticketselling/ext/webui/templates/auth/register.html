{% extends "layout/base.html" %}

{% block title %}
Đăng ký
{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center mb-2">
                    Đăng ký
                </h3>

                {% if err_msg %}
                <div class="alert alert-danger">
                    {{ err_msg }}
                </div>
                {% endif %}

                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">
                            Full name
                        </label>
                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            placeholder="Nhập họ và tên">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Username
                        </label>
                        <input
                            type="text"
                            class="form-control"
                            name="username"
                            placeholder="Nhập tên đăng nhập">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Email
                        </label>
                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            placeholder="Nhập địa chỉ email">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Password
                        </label>
                        <input
                            type="password"
                            class="form-control"
                            name="password"
                            placeholder="Nhập mật khẩu">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            Confirm password
                        </label>
                        <input
                            type="password"
                            class="form-control"
                            name="confirm"
                            placeholder="Xác nhận mật khẩu">
                    </div>
                    <button
                        type="submit"
                        class="btn btn-primary w-100">
                        Đăng ký
                    </button>
                </form>

                <p class="text-center mt-3 mb-0">
                    Bạn đã có tài khoản?
                    <a href="{{ url_for('webui.login') }}">
                        Đăng nhập
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
